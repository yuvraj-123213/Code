<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Controlled Particle System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; }
        #videoElement { display: none; /* Hide the raw video feed */ }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 20px; z-index: 10; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="loading">Loading Camera & AI Models... Please allow webcam access.</div>
    <video id="videoElement" autoplay playsinline></video>

    <script>
        // ==========================================
        // 1. THREE.JS SETUP & PARTICLE GENERATION
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const PARTICLE_COUNT = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        // Store different shape templates
        const shapes = {
            sphere: new Float32Array(PARTICLE_COUNT * 3),
            heart: new Float32Array(PARTICLE_COUNT * 3),
            flower: new Float32Array(PARTICLE_COUNT * 3),
            saturn: new Float32Array(PARTICLE_COUNT * 3)
        };

        // Helper: Generate Sphere (Firework burst base)
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            const r = 20;
            shapes.sphere[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            shapes.sphere[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            shapes.sphere[i * 3 + 2] = r * Math.cos(phi);
            
            // Initial position setup
            positions[i * 3] = shapes.sphere[i * 3];
            positions[i * 3 + 1] = shapes.sphere[i * 3 + 1];
            positions[i * 3 + 2] = shapes.sphere[i * 3 + 2];
        }
    

        // Helper: Generate Heart
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const t = Math.random() * Math.PI * 2;
            const r = Math.random() * 2 + 0.5; // Slight thickness
            shapes.heart[i * 3] = r * 16 * Math.pow(Math.sin(t), 3);
            shapes.heart[i * 3 + 1] = r * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            shapes.heart[i * 3 + 2] = (Math.random() - 0.5) * 5; 
        }

        // Helper: Generate Flower (Rose Curve)
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const k = 5; // Petal count
            const t = Math.random() * Math.PI * 2 * 10;
            const r = 25 * Math.cos(k * t) * Math.random();
            shapes.flower[i * 3] = r * Math.cos(t);
            shapes.flower[i * 3 + 1] = r * Math.sin(t);
            shapes.flower[i * 3 + 2] = (Math.random() - 0.5) * 4;
        }

        // Helper: Generate Saturn (Sphere + Ring)
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            if (i < PARTICLE_COUNT / 2) {
                // Planet
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const r = 10;
                shapes.saturn[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                shapes.saturn[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                shapes.saturn[i * 3 + 2] = r * Math.cos(phi);
            } else {
                // Rings
                const theta = Math.random() * Math.PI * 2;
                const r = 15 + Math.random() * 10;
                shapes.saturn[i * 3] = r * Math.cos(theta);
                shapes.saturn[i * 3 + 1] = (Math.random() - 0.5) * 2; // Flat ring
                shapes.saturn[i * 3 + 2] = r * Math.sin(theta);
            }
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.5,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // State Variables
        const shapeKeys = Object.keys(shapes);
        let currentShapeIndex = 0;
        let targetPositions = shapes[shapeKeys[currentShapeIndex]];
        let handScale = 1;
        let targetColor = new THREE.Color(0x00ffff);
        let canSwitchShape = true; // Debounce for switching shapes

        // ==========================================
        // 2. MEDIAPIPE HAND TRACKING SETUP
        // ==========================================
        const videoElement = document.getElementById('videoElement');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            document.getElementById('loading').style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Get Thumb tip (4) and Index finger tip (8)
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const palmBase = landmarks[0];

                // Calculate distance between thumb and index (Pinch)
                const dx = thumbTip.x - indexTip.x;
                const dy = thumbTip.y - indexTip.y;
                const dz = thumbTip.z - indexTip.z;
                const distance = Math.sqrt(dx*dx + dy*dy + dz*dz);

                // Map distance to scale expansion (0.05 to 0.3 generally)
                handScale = THREE.MathUtils.lerp(handScale, 1 + (distance * 3), 0.1);

                // Check for hard pinch to switch shapes
                if (distance < 0.05 && canSwitchShape) {
                    currentShapeIndex = (currentShapeIndex + 1) % shapeKeys.length;
                    targetPositions = shapes[shapeKeys[currentShapeIndex]];
                    canSwitchShape = false;
                    setTimeout(() => canSwitchShape = true, 1000); // 1 sec cooldown
                }

                // Map Palm X/Y to Rotation and Color
                const normalizedX = (palmBase.x - 0.5) * 2; // -1 to 1
                const normalizedY = (palmBase.y - 0.5) * 2;

                particleSystem.rotation.y = THREE.MathUtils.lerp(particleSystem.rotation.y, normalizedX * Math.PI, 0.1);
                particleSystem.rotation.x = THREE.MathUtils.lerp(particleSystem.rotation.x, normalizedY * Math.PI, 0.1);

                // Change color based on X position
                const hue = palmBase.x; 
                targetColor.setHSL(hue, 1.0, 0.5);
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // ==========================================
        // 3. ANIMATION & MORPHING LOOP
        // ==========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const positionsAttribute = particleSystem.geometry.attributes.position;
            const colorsAttribute = particleSystem.geometry.attributes.color;
            const time = clock.getElapsedTime();

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Morphing logic: move current pos towards target pos * scale
                const i3 = i * 3;
                
                // Add slight organic wave motion
                const waveX = Math.sin(time + positionsAttribute.array[i3+1] * 0.1) * 0.1;
                const waveY = Math.cos(time + positionsAttribute.array[i3] * 0.1) * 0.1;

                const targetX = targetPositions[i3] * handScale;
                const targetY = targetPositions[i3 + 1] * handScale;
                const targetZ = targetPositions[i3 + 2] * handScale;

                positionsAttribute.array[i3] += (targetX - positionsAttribute.array[i3]) * 0.05 + waveX;
                positionsAttribute.array[i3 + 1] += (targetY - positionsAttribute.array[i3 + 1]) * 0.05 + waveY;
                positionsAttribute.array[i3 + 2] += (targetZ - positionsAttribute.array[i3 + 2]) * 0.05;

                // Color transitioning
                const currentColor = new THREE.Color(colorsAttribute.array[i3], colorsAttribute.array[i3+1], colorsAttribute.array[i3+2]);
                currentColor.lerp(targetColor, 0.02);
                colorsAttribute.array[i3] = currentColor.r;
                colorsAttribute.array[i3 + 1] = currentColor.g;
                colorsAttribute.array[i3 + 2] = currentColor.b;
            }

            positionsAttribute.needsUpdate = true;
            colorsAttribute.needsUpdate = true;
            
            // Slow continuous rotation
            particleSystem.rotation.z += 0.002;

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
