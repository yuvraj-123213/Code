// ============================================================
// STATE
// ============================================================
var ST = { secIdx: 0, lessonId: null, quizData: null };
var PROG = {};
(function(){
  try {
    var s = localStorage.getItem('pylearn_v3');
    if(s) PROG = JSON.parse(s);
  } catch(e) {}
})();

function persist(){
  try { localStorage.setItem('pylearn_v3', JSON.stringify(PROG)); } catch(e) {}
}

function isDone(lid){ return !!(PROG[lid] && PROG[lid].done); }

function isUnlocked(si, li){
  if(si === 0 && li === 0) return true;
  if(li > 0) return isDone(CURRICULUM[si].lessons[li-1].id);
  if(si > 0){
    var ps = CURRICULUM[si-1];
    return isDone(ps.lessons[ps.lessons.length-1].id);
  }
  return false;
}

function totalLessons(){
  return CURRICULUM.reduce(function(a, s){ return a + s.lessons.length; }, 0);
}

function doneLessons(){
  return Object.keys(PROG).filter(function(k){ return PROG[k] && PROG[k].done; }).length;
}

function secDoneLessons(si){
  return CURRICULUM[si].lessons.filter(function(l){ return isDone(l.id); }).length;
}

// ============================================================
// SYNTAX HIGHLIGHTER — single-pass tokenizer, no regex on HTML
// ============================================================
function highlight(code){
  if(!code) return '';

  var KEYWORDS = {
    'def':1,'return':1,'if':1,'elif':1,'else':1,'while':1,'for':1,
    'in':1,'and':1,'or':1,'not':1,'True':1,'False':1,'None':1,'class':1,
    'import':1,'from':1,'break':1,'continue':1,'pass':1,'lambda':1,
    'global':1,'nonlocal':1,'del':1,'yield':1,'match':1,'case':1,
    'with':1,'as':1,'raise':1,'try':1,'except':1,'finally':1
  };

  var BUILTINS = {
    'print':1,'input':1,'len':1,'range':1,'int':1,'float':1,'str':1,
    'bool':1,'list':1,'dict':1,'set':1,'tuple':1,'type':1,'abs':1,
    'max':1,'min':1,'sum':1,'sorted':1,'enumerate':1,'zip':1,'map':1,
    'filter':1,'round':1,'append':1,'extend':1,'pop':1,'remove':1,
    'sort':1,'reverse':1,'index':1,'count':1,'get':1,'keys':1,
    'values':1,'items':1,'split':1,'upper':1,'lower':1,'strip':1,
    'replace':1,'startswith':1,'endswith':1,'isdigit':1,'capitalize':1
  };

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function span(cls, s){
    return '<span class="' + cls + '">' + esc(s) + '</span>';
  }

  var out = '';
  var i = 0;
  var src = code;
  var n = src.length;

  while(i < n){
    var c = src[i];

    // — Comment: # to end of line
    if(c === '#'){
      var end = src.indexOf('\n', i);
      var tok = (end === -1) ? src.slice(i) : src.slice(i, end);
      out += span('cmt', tok);
      i += tok.length;
      continue;
    }

    // — String: single or double quoted (with triple-quote support)
    if(c === '"' || c === "'"){
      var q = c;
      var isTriple = src.slice(i, i+3) === q+q+q;
      var delim = isTriple ? q+q+q : q;
      var j = i + delim.length;
      while(j < n){
        if(src[j] === '\\'){
          j += 2; // skip escaped character
          continue;
        }
        if(src.slice(j, j + delim.length) === delim){
          j += delim.length;
          break;
        }
        j++;
      }
      out += span('str', src.slice(i, j));
      i = j;
      continue;
    }

    // — Number: digit run (with optional decimal)
    if(c >= '0' && c <= '9'){
      var j = i;
      while(j < n && ((src[j] >= '0' && src[j] <= '9') || src[j] === '.')) j++;
      out += span('num', src.slice(i, j));
      i = j;
      continue;
    }

    // — Identifier: keyword, builtin, or plain name
    if((c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z') || c === '_'){
      var j = i;
      while(j < n){
        var ch = src[j];
        if((ch >= 'a' && ch <= 'z') || (ch >= 'A' && ch <= 'Z') ||
           (ch >= '0' && ch <= '9') || ch === '_'){
          j++;
        } else {
          break;
        }
      }
      var word = src.slice(i, j);
      var nextChar = (j < n) ? src[j] : '';
      if(KEYWORDS[word]){
        out += span('kw', word);
      } else if(BUILTINS[word] && nextChar === '('){
        out += span('bi', word);
      } else {
        out += esc(word);
      }
      i = j;
      continue;
    }

    // — Everything else: escape HTML special chars and output
    out += esc(c);
    i++;
  }

  return out;
}

// ============================================================
// PANEL MANAGER
// ============================================================
function showPanel(id){
  ['home-panel','quiz-panel','result-panel','sc-panel'].forEach(function(p){
    var el = document.getElementById(p);
    if(el) el.classList.remove('show');
  });
  var target = document.getElementById(id);
  if(target){
    target.classList.add('show');
    document.getElementById('main').scrollTop = 0;
  }
}

// ============================================================
// NAV + SIDEBAR
// ============================================================
function updateProgress(){
  var total = totalLessons();
  var done = doneLessons();
  var pct = total ? Math.round(done / total * 100) : 0;

  document.getElementById('navFill').style.width = pct + '%';
  document.getElementById('navPct').textContent = pct + '%';
  document.getElementById('sbFill').style.width = pct + '%';
  document.getElementById('sbDone').textContent = done + ' done';
  document.getElementById('sbTotal').textContent = total + ' total';
}

function buildSidebar(){
  updateProgress();
  var html = '';
  CURRICULUM.forEach(function(sec, si){
    var dc = secDoneLessons(si);
    var tc = sec.lessons.length;
    var isOpen = si === ST.secIdx;
    var allDone = dc === tc;
    var dotCls = allDone ? 'dot-done' : (isOpen ? 'dot-active' : 'dot-locked');
    var dotTxt = allDone ? '✓' : (isOpen ? '→' : '●');

    html += '<div class="sb-sec' + (isOpen ? ' sb-open' : '') + '">';
    html += '<button class="sb-sec-btn" onclick="selectSection(' + si + ')">';
    html += '<span class="sb-sec-num">0' + (si+1) + '</span>';
    html += '<span class="sb-sec-name">' + sec.title + '</span>';
    html += '<span class="sb-sec-dot ' + dotCls + '">' + dotTxt + '</span>';
    html += '</button>';

    if(isOpen){
      html += '<div class="sb-lessons">';
      sec.lessons.forEach(function(l, li){
        var done2 = isDone(l.id);
        var unl = isUnlocked(si, li);
        var active = ST.lessonId === l.id;
        var cls = 'sb-lesson' +
          (active ? ' sl-active' : '') +
          (done2 ? ' sl-done' : '') +
          (!unl ? ' sl-locked' : '');
        var click = unl ? 'onclick="startLesson(\'' + l.id + '\',' + si + ')"' : '';
        html += '<div class="' + cls + '" ' + click + '>';
        html += '<span class="sl-dot"></span>';
        html += '<span>' + (li+1) + '. ' + l.title + '</span>';
        if(done2) html += '<span class="sl-ck">✓</span>';
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  document.getElementById('sbScroll').innerHTML = html;
}

// ============================================================
// HOME VIEW
// ============================================================
function goHome(){
  ST.lessonId = null;
  buildSidebar();
  renderHome(ST.secIdx);
}

function selectSection(si){
  ST.secIdx = si;
  ST.lessonId = null;
  buildSidebar();
  renderHome(si);
}

function renderHome(si){
  var sec = CURRICULUM[si];
  var dc = secDoneLessons(si);
  var tc = sec.lessons.length;
  var pct = tc ? Math.round(dc / tc * 100) : 0;
  var allDone = dc === tc;
  var nextSi = si + 1;
  var circ = 2 * Math.PI * 28;
  var offset = circ * (1 - pct / 100);

  var html = '';

  // Hero card
  html += '<div class="sec-hero">';
  html += '<div class="hero-eyebrow">Section ' + (si+1) + ' of ' + CURRICULUM.length + '</div>';
  html += '<div class="hero-title">' + sec.title + '</div>';
  html += '<div class="hero-desc">' + sec.desc + '</div>';
  html += '<div class="hero-chips">';
  html += '<span class="hchip">📚 ' + tc + ' lessons</span>';
  html += '<span class="hchip">✅ ' + dc + ' done</span>';
  html += '<span class="hchip">🏆 ' + pct + '%</span>';
  html += '</div>';
  html += '<div class="hero-ring">';
  html += '<svg width="72" height="72">';
  html += '<circle cx="36" cy="36" r="28" stroke="#1c2035" stroke-width="5" fill="none"/>';
  html += '<circle cx="36" cy="36" r="28" stroke="' + sec.color + '" stroke-width="5" fill="none"';
  html += ' stroke-linecap="round"';
  html += ' stroke-dasharray="' + circ.toFixed(1) + '"';
  html += ' stroke-dashoffset="' + offset.toFixed(1) + '"';
  html += ' transform="rotate(-90 36 36)"/>';
  html += '</svg>';
  html += '<div class="hero-ring-pct">' + pct + '%</div>';
  html += '</div>';
  html += '</div>';

  // Lessons list
  html += '<div class="panel-label">Lessons in This Section</div>';
  html += '<div class="lessons-list">';
  sec.lessons.forEach(function(l, li){
    var done2 = isDone(l.id);
    var unl = isUnlocked(si, li);
    var active = ST.lessonId === l.id && !done2;
    var pr = PROG[l.id];

    var cls = 'lesson-row' +
      (done2 ? ' lr-done' : '') +
      (active ? ' lr-active' : '') +
      (!unl ? ' lr-locked' : '');

    var click = unl ? 'onclick="startLesson(\'' + l.id + '\',' + si + ')"' : '';
    var typeCls = l.type === 'learn' ? 'tt-learn' : (l.type === 'practice' ? 'tt-practice' : 'tt-project');

    html += '<div class="' + cls + '" ' + click + '>';
    if(active) html += '<div class="lr-pulse"></div>';
    html += '<div class="lr-num">' + String(li+1).padStart(2,'0') + '</div>';
    html += '<div class="lr-body">';
    html += '<div class="lr-title">' + l.title + '</div>';
    html += '<div class="lr-sub">' + l.sub + '</div>';
    html += '</div>';
    html += '<div class="lr-right">';
    html += '<span class="type-tag ' + typeCls + '">' + l.type + '</span>';
    if(done2){
      html += '<div class="lr-check">✓</div>';
    } else if(pr && pr.score !== undefined){
      html += '<span class="lr-score">' + pr.score + '/10</span>';
    } else if(!unl){
      html += '<span class="lr-lock">🔒</span>';
    }
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Next section / completion card
  if(allDone && nextSi < CURRICULUM.length){
    var ns = CURRICULUM[nextSi];
    html += '<div class="next-sec-card">';
    html += '<div>';
    html += '<div class="nsc-label">🎉 Section complete! Up next:</div>';
    html += '<div class="nsc-title">' + ns.title + '</div>';
    html += '<div class="nsc-desc">' + ns.desc + '</div>';
    html += '<button class="nsc-btn" onclick="selectSection(' + nextSi + ')">Start Section →</button>';
    html += '</div>';
    html += '</div>';
  } else if(allDone && nextSi >= CURRICULUM.length){
    html += '<div class="next-sec-card">';
    html += '<div><div class="nsc-label">🏆 All sections complete!</div>';
    html += '<div class="nsc-title">You have finished the course!</div>';
    html += '<div class="nsc-desc">You know the fundamentals of Python. Keep building projects!</div>';
    html += '</div></div>';
  } else {
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;text-align:center;color:var(--text2);font-size:12px;">';
    html += '💡 Complete each lesson in order to unlock the next one.';
    html += '</div>';
  }

  document.getElementById('home-panel').innerHTML = html;
  showPanel('home-panel');
}

// ============================================================
// QUIZ ENGINE
// ============================================================
function startLesson(lid, si){
  var sec = CURRICULUM[si];
  var lesson = null;
  for(var i = 0; i < sec.lessons.length; i++){
    if(sec.lessons[i].id === lid){ lesson = sec.lessons[i]; break; }
  }
  if(!lesson) return;

  ST.lessonId = lid;
  ST.secIdx = si;
  ST.quizData = {
    lid: lid,
    questions: lesson.questions,
    cur: 0,
    score: 0,
    answered: false
  };

  document.getElementById('qzName').textContent = lesson.title;
  buildSidebar();
  renderQuestion();
  showPanel('quiz-panel');
}

function renderQuestion(){
  var qd = ST.quizData;
  var q = qd.questions[qd.cur];
  var total = qd.questions.length;
  var pct = Math.round((qd.cur / total) * 100);

  document.getElementById('qzCtr').textContent = (qd.cur+1) + ' / ' + total;
  document.getElementById('qzProg').style.width = pct + '%';

  var nb = document.getElementById('btnNext');
  nb.classList.remove('btn-show');
  nb.textContent = qd.cur < total - 1 ? 'Next Question →' : 'See Results →';

  var html = '<div class="q-card">';
  html += '<div class="q-eyebrow">Question ' + (qd.cur+1) + ' of ' + total + '</div>';
  html += '<div class="q-text">' + q.q + '</div>';
  if(q.code){
    html += '<pre class="q-code">' + highlight(q.code) + '</pre>';
  }
  html += '</div>';

  html += '<div class="opts" id="opts">';
  var letters = ['A','B','C','D'];
  for(var i = 0; i < q.opts.length; i++){
    html += '<div class="opt" id="opt' + i + '" onclick="pickAnswer(' + i + ')">';
    html += '<div class="opt-ltr">' + letters[i] + '</div>';
    html += '<div class="opt-txt">' + q.opts[i] + '</div>';
    html += '</div>';
  }
  html += '</div>';
  html += '<div class="feedback" id="feedback"></div>';

  document.getElementById('qArea').innerHTML = html;
  qd.answered = false;
}

function pickAnswer(idx){
  var qd = ST.quizData;
  if(qd.answered) return;
  qd.answered = true;

  var q = qd.questions[qd.cur];
  var correct = q.ans;
  var isOk = idx === correct;
  if(isOk) qd.score++;

  document.querySelectorAll('.opt').forEach(function(o){ o.classList.add('opt-dis'); });

  var chosen = document.getElementById('opt' + idx);
  if(chosen) chosen.classList.add(isOk ? 'opt-ok' : 'opt-ng');
  if(!isOk){
    var cor = document.getElementById('opt' + correct);
    if(cor) cor.classList.add('opt-ok');
  }

  var fb = document.getElementById('feedback');
  if(fb){
    fb.className = 'feedback fb-show ' + (isOk ? 'fb-ok' : 'fb-ng');
    fb.innerHTML = '<span class="fb-ico">' + (isOk ? '🎯' : '💡') + '</span>';
    fb.innerHTML += '<div class="fb-body"><strong>' + (isOk ? 'Correct!' : 'Not quite.') + '</strong>' + q.exp + '</div>';
  }

  document.getElementById('btnNext').classList.add('btn-show');
}

function nextQ(){
  var qd = ST.quizData;
  if(!qd.answered) return;
  qd.cur++;
  if(qd.cur < qd.questions.length){
    renderQuestion();
    document.getElementById('quiz-panel').scrollTop = 0;
  } else {
    showResults();
  }
}

function exitQuiz(){
  ST.lessonId = null;
  buildSidebar();
  renderHome(ST.secIdx);
}

// ============================================================
// RESULTS
// ============================================================
function showResults(){
  var qd = ST.quizData;
  var score = qd.score;
  var total = qd.questions.length;
  var pct = Math.round((score / total) * 100);
  var passed = pct >= 60;

  var prev = PROG[qd.lid] || {};
  PROG[qd.lid] = { done: passed || !!prev.done, score: score, pct: pct };
  ST.lessonId = null;
  persist();
  buildSidebar();
  updateProgress();

  var stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 60 ? 1 : 0;
  var emojis = ['📚','✅','⭐','🏆'];
  var msgs = [
    'Keep going — every wrong answer teaches you something.',
    'Good start! Review the explanations and try again.',
    'Well done! Lesson complete. Keep the momentum!',
    'Perfect! You really know this material.'
  ];

  var html = '';
  html += '<div class="r-emoji">' + emojis[stars] + '</div>';
  html += '<div class="r-stars">' + '⭐'.repeat(stars) + '☆'.repeat(3-stars) + '</div>';
  html += '<div class="r-title">' + (passed ? 'Lesson Complete!' : 'Nice Try!') + '</div>';
  html += '<div class="r-fraction">' + score + '<span style="font-size:28px;color:var(--text2)">/' + total + '</span></div>';
  html += '<div class="r-pct-label">' + pct + '% correct</div>';
  html += '<div class="r-msg">' + msgs[stars] + '</div>';
  html += '<div class="r-breakdown">';
  html += '<div class="rb-item"><div class="rb-val c-g">' + score + '</div><div class="rb-lbl">Correct</div></div>';
  html += '<div class="rb-item"><div class="rb-val c-r">' + (total-score) + '</div><div class="rb-lbl">Wrong</div></div>';
  html += '<div class="rb-item"><div class="rb-val c-y">' + pct + '%</div><div class="rb-lbl">Score</div></div>';
  html += '</div>';
  html += '<div class="r-actions">';
  html += '<button class="btn-ghost" onclick="retryLesson()">🔄 Retry</button>';

  var si = ST.secIdx;
  var sec = CURRICULUM[si];
  var secAllDone = sec.lessons.every(function(l){ return isDone(l.id); });
  if(secAllDone && si+1 < CURRICULUM.length){
    html += '<button class="btn-primary" onclick="afterResult()">🚀 Next Section</button>';
  } else {
    html += '<button class="btn-primary" onclick="afterResult()">Back to Section</button>';
  }
  html += '</div>';
  if(!passed){
    html += '<div class="r-note">Need 60%+ to unlock the next lesson</div>';
  }

  document.getElementById('result-panel').innerHTML = html;
  showPanel('result-panel');

  if(passed && secAllDone){
    setTimeout(function(){ showSectionComplete(si); }, 1000);
  }
}

function retryLesson(){
  var lid = ST.quizData.lid;
  var si = ST.secIdx;
  startLesson(lid, si);
}

function afterResult(){
  var si = ST.secIdx;
  var sec = CURRICULUM[si];
  var secAllDone = sec.lessons.every(function(l){ return isDone(l.id); });
  if(secAllDone && si+1 < CURRICULUM.length){
    selectSection(si+1);
  } else {
    renderHome(si);
  }
}


function showSectionComplete(si){
  var sec = CURRICULUM[si];
  var nextSi = si + 1;
  var dc = secDoneLessons(si);
  var total = totalLessons();
  var done = doneLessons();
  var pct = total ? Math.round(done / total * 100) : 0;

  var html = '';
  html += '<div class="sc-banner">🎉🐍🎉</div>';
  html += '<div class="sc-title">Section Complete!</div>';
  html += '<div class="sc-sec-name">' + sec.title + '</div>';
  html += '<div class="sc-desc">You mastered all ' + dc + ' lessons in this section. Excellent work!</div>';
  html += '<div class="sc-stats">';
  html += '<div class="sc-stat"><div class="sc-stat-val">' + dc + '</div><div class="sc-stat-lbl">Lessons Done</div></div>';
  html += '<div class="sc-stat"><div class="sc-stat-val">' + CURRICULUM.length + '</div><div class="sc-stat-lbl">Sections</div></div>';
  html += '<div class="sc-stat"><div class="sc-stat-val">' + pct + '%</div><div class="sc-stat-lbl">Overall</div></div>';
  html += '</div>';

  if(nextSi < CURRICULUM.length){
    html += '<button class="sc-next-btn" onclick="selectSection(' + nextSi + ')">🚀 Start: ' + CURRICULUM[nextSi].title + '</button>';
  } else {
    html += '<div class="sc-finish">🏆 You completed the entire Python course! 🏆</div>';
  }
  html += '<button class="btn-ghost" onclick="renderHome(' + si + ')">Back to Section</button>';

  document.getElementById('sc-panel').innerHTML = html;
  showPanel('sc-panel');
}

// ============================================================
// BOOT
// ============================================================
buildSidebar();
renderHome(0);
</script>
</body>
</html>
